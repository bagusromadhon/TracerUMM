<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview Tema Tracer Study</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            /* Warna Tema Utama */
            --bg-color: #f8fafc; /* Latar Belakang (Off-white/Abu terang) */
            --primary-color: #0f172a; /* Biru Gelap (Profesional/Kampus) */
            --accent-color: #f59e0b; /* Emas/Kuning (Enerjik/CTA) */
            --text-main: #334155;
            --text-light: #64748b;
            --card-bg: rgba(255, 255, 255, 0.9);
            --border-radius: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, #e2e8f0, transparent 40%),
                              radial-gradient(circle at bottom left, #e0e7ff, transparent 40%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .dashboard-preview {
            width: 100%;
            max-width: 1000px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid rgba(15, 23, 42, 0.05);
        }

        .header h1 {
            color: var(--primary-color);
            font-size: 1.8rem;
            font-weight: 700;
        }

        .header p {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-top: 0.2rem;
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(245, 158, 11, 0.3);
        }

        .btn-primary:hover {
            background-color: #d97706;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(245, 158, 11, 0.4);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.8);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-title {
            color: var(--text-light);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            color: var(--primary-color);
            font-size: 2rem;
            font-weight: 700;
        }

        .chart-container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

    </style>
</head>
<body>

    <div class="dashboard-preview">
        <header class="header">
            <div>
                <h1>Tracer Study</h1>
                <p>Sistem Pelacakan Alumni Universitas</p>
            </div>
            <button class="btn-primary">Unduh Laporan</button>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-title">Total Alumni Terdata</div>
                <div class="stat-value">142,053</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">Persentase Bekerja</div>
                <div class="stat-value" style="color: #10b981;">84.2%</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">Rata-rata Masa Tunggu</div>
                <div class="stat-value">3.5 Bulan</div>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="alumniChart" height="100"></canvas>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('alumniChart').getContext('2d');
        
        // Gradient for Chart
        const gradient = ctx.createLinearGradient(0, 0, 0, 400);
        gradient.addColorStop(0, 'rgba(15, 23, 42, 0.8)'); // Primary Color
        gradient.addColorStop(1, 'rgba(15, 23, 42, 0.1)');

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['2019', '2020', '2021', '2022', '2023', '2024'],
                datasets: [{
                    label: 'Lulusan Terserap Industri',
                    data: [12000, 15000, 14500, 18000, 22000, 26000],
                    borderColor: '#0f172a',
                    backgroundColor: gradient,
                    borderWidth: 3,
                    fill: true,
                    tension: 0.4, // Smooth curves
                    pointBackgroundColor: '#f59e0b', // Accent color
                    pointBorderColor: '#fff',
                    pointBorderWidth: 2,
                    pointRadius: 5,
                    pointHoverRadius: 7
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        position: 'top',
                        labels: {
                            font: { family: 'Inter' }
                        }
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        grid: { borderDash: [5, 5] }
                    },
                    x: {
                        grid: { display: false }
                    }
                }
            }
        });
    </script>
</body>
</html>
